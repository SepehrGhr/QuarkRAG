name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Lint Checks
        run: ruff check .

  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Ingestion Service Image
        run: docker build -t quarkrag-ingestion-service:latest -f services/ingestion/Dockerfile services/ingestion
      - name: Build Embedding Service Image
        run: docker build -t quarkrag-embedding-service:latest -f services/embedding/Dockerfile services/embedding
      - name: Build LLM Provider Service Image
        run: docker build -t quarkrag-llm-provider-service:latest -f services/llm_provider/Dockerfile services/llm_provider
      - name: Build Query Service Image
        run: docker build -t quarkrag-query-service:latest -f services/query/Dockerfile services/query

