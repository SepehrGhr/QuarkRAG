apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: quarkrag
  labels:
    app: embedding-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      containers:
        - name: embedding-service
          image: quarkrag/embedding-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: quarkrag-config
            - secretRef:
                name: quarkrag-secrets
          startupProbe:
            httpGet:
              path: /readiness
              port: 8000
            failureThreshold: 24
            periodSeconds: 5 # Total timeout: 120s
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8000
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: quarkrag
spec:
  selector:
    app: embedding-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
