apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-query-to-kafka
  namespace: quarkrag
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: query-service
      ports:
        - protocol: TCP
          port: 9092
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-query-to-kafka
  namespace: quarkrag
spec:
  podSelector:
    matchLabels:
      app: query-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
