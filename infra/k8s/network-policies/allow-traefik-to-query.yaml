apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-query
  namespace: quarkrag
spec:
  podSelector:
    matchLabels:
      app: query-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: traefik
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-traefik-to-query
  namespace: quarkrag
spec:
  podSelector:
    matchLabels:
      app: traefik
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: query-service
      ports:
        - protocol: TCP
          port: 8000
