apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-embedding-to-postgres
  namespace: quarkrag
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: embedding-service
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-embedding-to-postgres
  namespace: quarkrag
spec:
  podSelector:
    matchLabels:
      app: embedding-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
