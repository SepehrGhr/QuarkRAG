apiVersion: v1
kind: Secret
metadata:
  name: quarkrag-secrets
  namespace: quarkrag
type: Opaque
stringData:
  # In a real production environment, these should be managed by a secrets manager 
  # (e.g., HashiCorp Vault, AWS Secrets Manager, SealedSecrets) and not committed to git.
  DATABASE_URL: "postgresql+asyncpg://quarkrag:password123@postgres:5432/quarkrag"
  POSTGRES_USER: "quarkrag"
  POSTGRES_PASSWORD: "password123"
  POSTGRES_DB: "quarkrag"
  OPENAI_API_KEY: "your-openai-key-here"
