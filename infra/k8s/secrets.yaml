apiVersion: v1
kind: Secret
metadata:
  name: quarkrag-secrets
  namespace: quarkrag
type: Opaque
stringData:
  # Sensitive database credentials and external API keys.
  # These are substituted from env vars using the apply.sh script.
  DATABASE_URL: "$DATABASE_URL"
  POSTGRES_USER: "$POSTGRES_USER"
  POSTGRES_PASSWORD: "$POSTGRES_PASSWORD"
  POSTGRES_DB: "$POSTGRES_DB"
  OPENAI_API_KEY: "$OPENAI_API_KEY"
