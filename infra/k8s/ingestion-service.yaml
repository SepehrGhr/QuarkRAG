apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: quarkrag
  labels:
    app: ingestion-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion-service
          image: quarkrag-ingestion-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: quarkrag-config
            - secretRef:
                name: quarkrag-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: quarkrag
spec:
  selector:
    app: ingestion-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
